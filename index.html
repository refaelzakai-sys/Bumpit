<!DOCTYPE html>
<html lang="he" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bumpit</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --bg: #f0f2f5;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 110px;
            height: 110px;
            border-radius: 22px;
            margin-bottom: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        h1 { font-size: 32px; margin: 0.5rem 0; font-weight: 800; color: #1a1a1a; }
        p { color: #666; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* כפתור העלאה */
        .btn-upload {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem 2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            display: none; /* מוסתר עד להתחברות */
        }
        .btn-upload:active { transform: scale(0.96); background-color: var(--primary-dark); }
        
        #status {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: var(--primary);
            font-weight: 500;
            min-height: 1.2em;
        }

        .google-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }

        /* עיצוב מותאם למובייל */
        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://i.ibb.co/wNLdsyMt/432078-rounded-1920x1920.png" class="logo" alt="Bumpit Logo">
    
    <h1 id="t-title">Bumpit</h1>
    <p id="t-desc">העברת קבצים בנגיעה אחת</p>

    <div id="google-login-section">
        <div id="g_id_onload"
             data-client_id="10051830796-eik6ehar7e71gj40i003g5o8u7bniium.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="true">
        </div>
        <div class="google-btn-container">
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
        </div>
    </div>

    <input type="file" id="fileInput" style="display: none;">
    <button id="t-btn" class="btn-upload" onclick="document.getElementById('fileInput').click()">בחר קובץ</button>
    
    <div id="status"></div>
</div>

<script>
    // הגדרות בסיסיות וזיהוי שפה
    const userLang = navigator.language || 'en';
    const isHe = userLang.startsWith('he');
    
    const translations = {
        he: { title: "Bumpit", desc: "העברת קבצים בנגיעה אחת", btn: "בחר קובץ להעברה", prep: "...מכין להעברה בסתר", ready: "מוכן! הצמד מכשירים כעת", conn: "מחובר כ-" },
        en: { title: "Bumpit", desc: "One-Touch File Transfer", btn: "Choose File to Transfer", prep: "Preparing transfer...", ready: "Ready! Bump devices now", conn: "Connected as " }
    };

    const t = isHe ? translations.he : translations.en;

    // עדכון טקסטים ראשוני
    document.getElementById('t-title').innerText = t.title;
    document.getElementById('t-desc').innerText = t.desc;
    document.getElementById('t-btn').innerText = t.btn;

    // בדיקת זכירה אוטומטית (LocalStorage)
    window.onload = function() {
        const savedUser = localStorage.getItem('bumpit_user');
        if (savedUser) {
            const user = JSON.parse(savedUser);
            showUploadUI(user.name);
            // דיווח שקט לבוט שהמשתמש חזר
            silentReport(user, 'User Returned (Auto-Login)');
        }
        
        // רישום Service Worker (חובה ל-PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    };

    // טיפול בתגובה מגוגל
    function handleCredentialResponse(response) {
        // פיענוח ה-Token (JWT)
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const payload = JSON.parse(window.atob(base64));

        const userData = {
            name: payload.name,
            email: payload.email,
            id: payload.sub
        };

        // שמירה לזכירה אוטומטית
        localStorage.setItem('bumpit_user', JSON.stringify(userData));
        
        // דיווח שקט לבוט
        silentReport(userData, 'New Login/Registration');
        
        showUploadUI(userData.name);
    }

    // פונקציית דיווח שקט לשרת (שמעביר לבוט)
    async function silentReport(user, eventType) {
        try {
            await fetch('/report-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    event: eventType,
                    name: user.name,
                    email: user.email,
                    lang: userLang,
                    device: navigator.userAgent
                })
            });
        } catch (e) { console.error("Report failed"); }
    }

    function showUploadUI(name) {
        document.getElementById('google-login-section').style.display = 'none';
        document.getElementById('t-btn').style.display = 'block';
        document.getElementById('status').innerText = t.conn + name;
    }

    // טיפול בבחירת קובץ והעלאה
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const status = document.getElementById('status');
        status.innerText = t.prep;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('lang', userLang);
        formData.append('device', navigator.userAgent);

        try {
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();

            if (data.url) {
                status.innerText = t.ready;
                // הפעלת הנגיעה
                triggerNfc(data.url);
            }
        } catch (err) {
            status.innerText = isHe ? "שגיאה בהעלאה" : "Upload Error";
        }
    });

    // פונקציית ה-NFC (העברה בנגיעה)
    async function triggerNfc(url) {
        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                await ndef.write({
                    records: [{ recordType: "url", data: url }]
                });
            } catch (error) {
                console.log("NFC error: " + error);
            }
        } else {
            console.log("Web NFC not supported on this device/browser.");
        }
    }
</script>

</body>
</html>
