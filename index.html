<!DOCTYPE html>
<html lang="he" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bumpit</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: white; padding: 2.5rem; border-radius: 2.5rem; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        
        /* הגנה על הלוגו */
        .logo { width: 110px; height: 110px; border-radius: 22px; margin-bottom: 1.5rem; 
                pointer-events: none; user-select: none; -webkit-user-drag: none; }
        
        h1 { font-size: 28px; margin-bottom: 1.5rem; font-weight: 800; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 15px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .link { color: var(--primary); cursor: pointer; font-size: 0.9rem; margin-top: 15px; display: block; font-weight: 600; }
        #upload-section { display: none; }
        #status { margin-top: 15px; color: var(--primary); font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://i.ibb.co/wNLdsyMt/432078-rounded-1920x1920.png" 
         class="logo" 
         oncontextmenu="return false;" 
         ondragstart="return false;">
         
    <h1 id="t-title">Bumpit</h1>
    
    <div id="auth-section">
        <h2 id="auth-header">התחברות</h2>
        <input type="email" id="email" placeholder="אימייל">
        <input type="password" id="password" placeholder="סיסמה">
        <button class="btn" onclick="handleAuth()" id="auth-btn">כניסה</button>
        <span class="link" onclick="toggleAuth()" id="auth-toggle">אין לך חשבון? הירשם כאן</span>
    </div>

    <div id="upload-section">
        <p id="t-desc">העברת קבצים בנגיעה</p>
        <input type="file" id="fileInput" style="display:none">
        <button class="btn" onclick="document.getElementById('fileInput').click()" id="t-btn">בחר קובץ</button>
        <div id="status"></div>
    </div>
</div>

<script>
    const userLang = navigator.language;
    const isHe = userLang.startsWith('he');
    let isLoginMode = true;

    window.onload = () => {
        const saved = localStorage.getItem('bump_user');
        if (saved) showUpload();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(() => console.log("PWA Active"));
        }
    };

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        const h = document.getElementById('auth-header');
        const b = document.getElementById('auth-btn');
        const t = document.getElementById('auth-toggle');
        
        h.innerText = isLoginMode ? (isHe ? "התחברות" : "Login") : (isHe ? "הרשמה" : "Register");
        b.innerText = isLoginMode ? (isHe ? "כניסה" : "Login") : (isHe ? "הרשמה" : "Register");
        t.innerText = isLoginMode ? (isHe ? "אין לך חשבון? הירשם" : "No account? Register") : (isHe ? "יש לך חשבון? התחבר" : "Have an account? Login");
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if(!email || !password) return;

        const endpoint = isLoginMode ? '/auth/login' : '/auth/register';
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, password, lang: userLang, device: navigator.userAgent })
        });

        if (res.ok) {
            localStorage.setItem('bump_user', email);
            showUpload();
        } else {
            alert(isHe ? "פרטים לא נכונים" : "Auth Failed");
        }
    }

    function showUpload() {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('upload-section').style.display = 'block';
    }

    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        
        const status = document.getElementById('status');
        status.innerText = isHe ? "...מעלה בסתר" : "Uploading...";

        const formData = new FormData();
        formData.append('file', file);
        formData.append('email', localStorage.getItem('bump_user'));
        formData.append('lang', userLang);
        formData.append('device', navigator.userAgent);

        try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.url) {
                status.innerText = isHe ? "מוכן! הצמד מכשירים" : "Ready! Bump now";
                if ('NDEFReader' in window) {
                    const ndef = new NDEFReader();
                    await ndef.write({ records: [{ recordType: "url", data: data.url }] });
                }
            }
        } catch(e) { status.innerText = "Error"; }
    };
</script>
</body>
</html>
