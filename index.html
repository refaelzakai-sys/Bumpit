<!DOCTYPE html>
<html lang="he" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bumpit</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      // המפתחות החדשים שלך מ-Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyBzyVDlZNSjFJuS8Un_75rlIZF3dXLDVB4",
        authDomain: "bumpit-94edb.firebaseapp.com",
        databaseURL: "https://bumpit-94edb-default-rtdb.firebaseio.com",
        projectId: "bumpit-94edb",
        storageBucket: "bumpit-94edb.firebasestorage.app",
        messagingSenderId: "270788408373",
        appId: "1:270788408373:web:de5d3f0087013085686d7c"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getDatabase(app);

      onAuthStateChanged(auth, (user) => {
        if (user) showUploadUI(user.email);
      });

      window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const isLogin = document.getElementById('auth-header').innerText.includes("התחברות");
        const status = document.getElementById('auth-status');

        try {
          if (isLogin) {
            await signInWithEmailAndPassword(auth, email, password);
          } else {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            // שמירת המשתמש במסד הנתונים כדי שיזכר לתמיד
            const userId = userCredential.user.uid;
            await set(ref(db, 'users/' + userId), { email: email, registeredAt: Date.now() });
          }
        } catch (error) { status.innerText = "שגיאה: " + error.message; }
      };
    </script>
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; }
        body { font-family: system-ui; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .logo { width: 110px; height: 110px; border-radius: 22px; margin-bottom: 1.5rem; pointer-events: none; -webkit-user-drag: none; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 50px; width: 100%; cursor: pointer; font-weight: bold; }
        #upload-section { display: none; }
    </style>
</head>
<body>
<div class="card">
    <img src="https://i.ibb.co/wNLdsyMt/432078-rounded-1920x1920.png" class="logo" oncontextmenu="return false;">
    <h1>Bumpit</h1>
    <div id="auth-section">
        <h2 id="auth-header">התחברות</h2>
        <input type="email" id="email" placeholder="אימייל">
        <input type="password" id="password" placeholder="סיסמה">
        <div id="auth-status" style="color:red; font-size:12px;"></div>
        <button class="btn" onclick="handleAuth()">המשך</button>
        <p onclick="toggleAuth()" style="cursor:pointer; color:var(--primary); margin-top:10px;">אין לך חשבון? הירשם</p>
    </div>
    <div id="upload-section">
        <p>שלום, <b id="user-email"></b></p>
        <button class="btn" onclick="document.getElementById('fileInput').click()">בחר קובץ להעברה</button>
        <input type="file" id="fileInput" style="display:none">
    </div>
</div>
<script>
    function toggleAuth() {
        const h = document.getElementById('auth-header');
        h.innerText = h.innerText === "התחברות" ? "הרשמה" : "התחברות";
    }
    function showUploadUI(email) {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('upload-section').style.display = 'block';
        document.getElementById('user-email').innerText = email;
    }
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>
</body>
</html>
