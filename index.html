<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bumpit</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzyVDlZNSjFJuS8Un_75rlIZF3dXLDVB4",
            authDomain: "bumpit-94edb.firebaseapp.com",
            projectId: "bumpit-94edb",
            storageBucket: "bumpit-94edb.firebasestorage.app",
            messagingSenderId: "270788408373",
            appId: "1:270788408373:web:de5d3f0087013085686d7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem('user_email', user.email);
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('main-page').style.display = 'flex';
                fetch('/report-user', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: user.email, event: 'כניסה למערכת' })
                });
            }
        });

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const isLogin = document.getElementById('auth-title').innerText === "כניסה";
            const btn = document.querySelector('.btn-main');
            
            try {
                btn.innerText = "טוען...";
                if (isLogin) await signInWithEmailAndPassword(auth, email, password);
                else await createUserWithEmailAndPassword(auth, email, password);
            } catch (e) {
                alert("שגיאה: " + e.message);
                btn.innerText = "המשך";
            }
        };
    </script>

    <style>
        :root { --accent: #007aff; --bg: #050505; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: white; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            overflow: hidden;
        }
        
        .page { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; text-align: center; box-sizing: border-box;
            position: absolute; top: 0; left: 0;
        }

        /* דף כניסה */
        .logo-login { width: 110px; height: 110px; border-radius: 28px; margin-bottom: 2.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .glass-box { 
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); 
            padding: 40px; border-radius: 40px; width: 85%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        
        h1 { font-size: 2.5rem; font-weight: 200; margin: 0 0 2rem 0; letter-spacing: 5px; text-transform: uppercase; }
        input { 
            width: 100%; background: #111; border: 1px solid #222; padding: 18px; border-radius: 18px; 
            color: white; margin-bottom: 15px; font-size: 1rem; text-align: center; outline: none; box-sizing: border-box;
        }
        .btn-main { width: 100%; background: white; color: black; border: none; padding: 18px; border-radius: 40px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.95); }

        /* דף ראשי - מרכוז יוקרתי */
        #main-page { display: none; }
        .upload-sphere {
            width: 240px; height: 240px; border-radius: 50%;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 60px rgba(0,122,255,0.05);
        }
        .upload-sphere:active { transform: scale(0.9); box-shadow: 0 0 100px rgba(0,122,255,0.2); }
        
        #status { margin-top: 50px; font-weight: 300; color: #888; font-size: 0.9rem; letter-spacing: 2px; }
        .progress-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 5px; background: rgba(255,255,255,0.05); }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.2s; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

<audio id="bump-sound" src="/bump.wav" preload="auto"></audio>

<div id="auth-page" class="page">
    <img src="https://i.ibb.co/wNLdsyMt/432078-rounded-1920x1920.png" class="logo-login">
    <div class="glass-box">
        <h2 id="auth-title" style="margin-top:0; font-weight:300">כניסה</h2>
        <input type="email" id="email" placeholder="אימייל">
        <input type="password" id="password" placeholder="סיסמה">
        <button class="btn-main" onclick="handleAuth()">המשך</button>
        <p style="font-size: 0.85rem; margin-top: 25px; opacity: 0.5; cursor: pointer;" onclick="toggleAuth()">ליצירת חשבון חדש</p>
    </div>
</div>

<div id="main-page" class="page">
    <h1>BUMPIT</h1>
    <div class="upload-sphere" onclick="document.getElementById('fileInput').click()">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </div>
    <input type="file" id="fileInput" style="display:none">
    <div id="status">מוכן להעברה</div>
    <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
</div>

<script>
    function toggleAuth() {
        const title = document.getElementById('auth-title');
        title.innerText = title.innerText === "כניסה" ? "הרשמה" : "כניסה";
    }

    const fileInput = document.getElementById('fileInput');
    const bumpSound = document.getElementById('bump-sound');

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;

        // הפעלת הסאונד האישי שלך (WAV)
        bumpSound.currentTime = 0;
        bumpSound.play().catch(() => {});

        const status = document.getElementById('status');
        const bar = document.getElementById('bar');
        
        const formData = new FormData();
        formData.append('file', file);
        formData.append('email', localStorage.getItem('user_email'));

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload', true);

        xhr.upload.onprogress = (event) => {
            if (event.lengthComputable) {
                const percent = (event.loaded / event.total) * 100;
                bar.style.width = percent + "%";
                status.innerText = "מעלה: " + Math.round(percent) + "%";
            }
        };

        xhr.onload = function() {
            if (xhr.status === 200) {
                status.innerText = "העברה הושלמה";
                setTimeout(() => { bar.style.width = "0%"; status.innerText = "מוכן להעברה"; }, 2000);
            } else {
                status.innerText = "שגיאה - נסה שוב";
            }
        };

        xhr.send(formData);
    };

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>
</body>
</html>
