<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bumpit Premium</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzyVDlZNSjFJuS8Un_75rlIZF3dXLDVB4",
            authDomain: "bumpit-94edb.firebaseapp.com",
            projectId: "bumpit-94edb",
            storageBucket: "bumpit-94edb.firebasestorage.app",
            messagingSenderId: "270788408373",
            appId: "1:270788408373:web:de5d3f0087013085686d7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem('user_email', user.email);
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('main-page').style.display = 'flex';
                // דיווח לבוט על כניסה
                fetch('/report-user', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: user.email, event: 'כניסה למערכת' })
                });
            }
        });

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const isLogin = document.getElementById('auth-title').innerText === "כניסה";
            
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
            } catch (e) {
                alert("שגיאה: " + e.message);
            }
        };
    </script>

    <style>
        :root { --accent: #007aff; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        .page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; padding: 20px; text-align: center; }
        
        /* דף כניסה */
        .logo-login { width: 100px; height: 100px; border-radius: 25px; margin-bottom: 2rem; }
        .glass-box { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); padding: 35px; border-radius: 35px; width: 100%; max-width: 380px; }
        
        h1 { font-size: 2.2rem; font-weight: 200; margin-bottom: 2rem; letter-spacing: 4px; }
        input { width: 100%; background: #111; border: 1px solid #222; padding: 18px; border-radius: 15px; color: white; margin-bottom: 15px; font-size: 1rem; text-align: center; }
        .btn-main { width: 100%; background: white; color: black; border: none; padding: 18px; border-radius: 40px; font-weight: 700; cursor: pointer; }

        /* דף ראשי */
        #main-page { display: none; }
        .upload-sphere {
            width: 220px; height: 220px; border-radius: 50%;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.5s; box-shadow: 0 0 50px rgba(0,122,255,0.1);
        }
        .upload-sphere:active { transform: scale(0.92); }
        #status { margin-top: 60px; font-weight: 200; color: #888; letter-spacing: 1px; text-transform: uppercase; }
        .progress { position: fixed; bottom: 0; left: 0; height: 4px; background: var(--accent); transition: 0.3s; width: 0; }
    </style>
</head>
<body>

<audio id="bump-sound" src="/bump.mp3" preload="auto"></audio>

<div id="auth-page" class="page">
    <img src="https://i.ibb.co/wNLdsyMt/432078-rounded-1920x1920.png" class="logo-login">
    <div class="glass-box">
        <h2 id="auth-title">כניסה</h2>
        <input type="email" id="email" placeholder="אימייל">
        <input type="password" id="password" placeholder="סיסמה">
        <button class="btn-main" onclick="handleAuth()">המשך</button>
        <p style="font-size: 0.8rem; margin-top: 20px; opacity: 0.5; cursor: pointer;" onclick="document.getElementById('auth-title').innerText='הרשמה'">ליצירת חשבון חדש</p>
    </div>
</div>

<div id="main-page" class="page">
    <h1>BUMPIT</h1>
    <div class="upload-sphere" onclick="document.getElementById('fileInput').click()">
        <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </div>
    <input type="file" id="fileInput" style="display:none">
    <div id="status">מוכן להעברה</div>
    <div class="progress" id="bar"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const bumpSound = document.getElementById('bump-sound');

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;

        // הפעלת הסאונד בתחילת העברה
        bumpSound.play().catch(err => console.log("Sound error:", err));

        const status = document.getElementById('status');
        const bar = document.getElementById('bar');
        
        const formData = new FormData();
        formData.append('file', file);
        formData.append('email', localStorage.getItem('user_email'));

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload', true);

        xhr.upload.onprogress = (event) => {
            const percent = (event.loaded / event.total) * 100;
            bar.style.width = percent + "%";
            status.innerText = "מעלה: " + Math.round(percent) + "%";
        };

        xhr.onload = function() {
            if (xhr.status === 200) {
                status.innerText = "העברה הושלמה בהצלחה";
                bar.style.width = "0%";
            } else {
                status.innerText = "שגיאה בהעלאה";
            }
        };
        xhr.send(formData);
    };

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>
</body>
</html>
